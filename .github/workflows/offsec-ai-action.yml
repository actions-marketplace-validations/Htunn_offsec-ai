# offsec-ai GitHub Action — example workflow
#
# Copy relevant jobs into your own repository's .github/workflows/ folder.
#
# The action is published at: https://github.com/Htunn/offsec-ai
# Use it with:  uses: Htunn/offsec-ai@v2.5.9

name: offsec-ai Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Example 1: OWASP Web Scan (no secrets required)
  # ---------------------------------------------------------------------------
  owasp-scan:
    name: OWASP Web Scan
    runs-on: ubuntu-latest
    steps:
      - name: Run OWASP scan against simpleportchecker.com
        id: owasp
        uses: Htunn/offsec-ai@v2.5.9
        with:
          scan-type: owasp-scan
          target: https://www.simpleportchecker.com
          timeout: "30"
          output-format: json
          output-file: owasp-report.json
          extra-args: "--categories A01,A02,A03,A05,A06"

      - name: Print scan summary
        run: |
          echo "Risk level:  ${{ steps.owasp.outputs.risk-level }}"
          echo "Findings:    ${{ steps.owasp.outputs.findings-count }}"
          echo "Report path: ${{ steps.owasp.outputs.report-path }}"

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: owasp-report.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Example 2: Port + L7 + Certificate scan
  # ---------------------------------------------------------------------------
  infra-scan:
    name: Infrastructure Scan
    runs-on: ubuntu-latest
    steps:
      - name: Port scan
        id: port
        uses: Htunn/offsec-ai@v2.5.9
        with:
          scan-type: scan
          target: https://www.simpleportchecker.com
          timeout: "20"
          output-file: port-report.json
          extra-args: "--ports 80,443,8080,8443"

      - name: L7 protection detection
        id: l7
        uses: Htunn/offsec-ai@v2.5.9
        with:
          scan-type: l7-check
          target: https://www.simpleportchecker.com
          timeout: "20"
          output-file: l7-report.json

      - name: TLS certificate analysis
        id: cert
        uses: Htunn/offsec-ai@v2.5.9
        with:
          scan-type: cert-check
          target: https://www.simpleportchecker.com
          timeout: "20"
          output-file: cert-report.json

      - name: Upload infrastructure reports
        uses: actions/upload-artifact@v4
        with:
          name: infra-reports
          path: "*.json"
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Example 3: MCP Server scan against a public MCP endpoint
  # ---------------------------------------------------------------------------
  mcp-scan:
    name: MCP Server Scan
    runs-on: ubuntu-latest
    steps:
      - name: Scan MCP server
        id: mcp
        uses: Htunn/offsec-ai@v2.5.9
        with:
          scan-type: mcp-scan
          target: https://mcp.simpleportchecker.com/mcp
          timeout: "30"
          output-file: mcp-report.json
          fail-on-findings: "false"

      - name: Fail if critical MCP vulnerabilities found
        if: steps.mcp.outputs.risk-level == 'CRITICAL'
        run: |
          echo "::error::Critical MCP vulnerabilities detected!"
          exit 1

      - name: Upload MCP report
        uses: actions/upload-artifact@v4
        with:
          name: mcp-report
          path: mcp-report.json

  # ---------------------------------------------------------------------------
  # Example 4: AI/LLM OWASP scan using the Gemini public endpoint
  # Requires: GEMINI_API_KEY repository secret
  # ---------------------------------------------------------------------------
  ai-owasp-scan:
    name: AI/LLM OWASP Scan
    runs-on: ubuntu-latest
    steps:
      - name: Scan Gemini endpoint for OWASP LLM Top 10 (2025)
        id: ai-owasp
        uses: Htunn/offsec-ai@v2.5.9
        with:
          scan-type: ai-owasp-scan
          target: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
          api-key: ${{ secrets.GEMINI_API_KEY }}
          timeout: "45"
          output-file: ai-owasp-report.json
          extra-args: "--mode safe"
          fail-on-findings: "false"

      - name: Show AI scan risk level
        run: |
          echo "LLM risk level: ${{ steps.ai-owasp.outputs.risk-level }}"
          echo "Findings:       ${{ steps.ai-owasp.outputs.findings-count }}"

      - name: Upload AI OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: ai-owasp-report
          path: ai-owasp-report.json

  # ---------------------------------------------------------------------------
  # Example 5: Full scan with fail-on-findings (gate for production deploys)
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate (Full Scan)
    runs-on: ubuntu-latest
    steps:
      - name: Full security scan
        id: full
        uses: Htunn/offsec-ai@v2.5.9
        with:
          scan-type: full-scan
          target: https://www.simpleportchecker.com
          timeout: "30"
          output-file: full-report.json
          fail-on-findings: "false" # set "true" to block on findings

      - name: Security gate result
        run: |
          echo "Risk: ${{ steps.full.outputs.risk-level }}"
          echo "Total findings: ${{ steps.full.outputs.findings-count }}"
          if [ "${{ steps.full.outputs.risk-level }}" = "CRITICAL" ]; then
            echo "::error::CRITICAL risk detected — block deployment"
            exit 1
          fi

      - name: Upload full scan report
        uses: actions/upload-artifact@v4
        with:
          name: full-scan-report
          path: full-report.json
          retention-days: 90
