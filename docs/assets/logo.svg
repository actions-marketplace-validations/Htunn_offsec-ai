<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="120" rx="10" fill="url(#bg)"/>

  <!-- Shield icon -->
  <g transform="translate(18, 14)" filter="url(#glow)">
    <path d="M18 2 L34 8 L34 22 Q34 32 18 38 Q2 32 2 22 L2 8 Z"
          fill="none" stroke="url(#red)" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Crosshair inside shield -->
    <line x1="18" y1="14" x2="18" y2="28" stroke="#ff4444" stroke-width="1.5"/>
    <line x1="11" y1="21" x2="25" y2="21" stroke="#ff4444" stroke-width="1.5"/>
    <circle cx="18" cy="21" r="3" fill="none" stroke="#ff6666" stroke-width="1.3"/>
  </g>

  <!-- "offsec" in bold red -->
  <text x="62" y="62" font-family="'Courier New', Courier, monospace" font-size="38"
        font-weight="bold" fill="url(#red)" filter="url(#glow)" letter-spacing="1">offsec</text>

  <!-- dash separator -->
  <text x="262" y="62" font-family="'Courier New', Courier, monospace" font-size="38"
        font-weight="bold" fill="#555555">-</text>

  <!-- "ai" in lighter accent -->
  <text x="285" y="62" font-family="'Courier New', Courier, monospace" font-size="38"
        font-weight="bold" fill="#ff8888" filter="url(#glow)">ai</text>

  <!-- Tagline -->
  <text x="62" y="85" font-family="'Courier New', Courier, monospace" font-size="11"
        fill="#888888" letter-spacing="2">OFFENSIVE-SECURITY TOOLKIT  ·  AI/LLM  ·  MCP</text>

  <!-- Version badge -->
  <rect x="62" y="94" width="52" height="16" rx="3" fill="#cc000033" stroke="#cc000066" stroke-width="0.8"/>
  <text x="88" y="106" font-family="'Courier New', Courier, monospace" font-size="9"
        fill="#ff6666" text-anchor="middle">v2.0.0</text>

  <!-- Right decorative dots (terminal-like) -->
  <circle cx="470" cy="26" r="5" fill="#ff4444" opacity="0.9"/>
  <circle cx="490" cy="26" r="5" fill="#ffaa00" opacity="0.8"/>
  <circle cx="510" cy="26" r="5" fill="#44cc44" opacity="0.8"/>
</svg>
